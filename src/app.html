<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="theme-color" content="#16213e" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('yacito:themePreference') || 'system';
          const wantsDark = stored === 'dark' || (stored === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = wantsDark ? 'dark' : 'light';
        } catch {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <title>Yacito</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
