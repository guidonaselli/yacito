name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build release bundle (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Linux dependencies for Tauri
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Build desktop bundle
        uses: tauri-apps/tauri-action@v0.6.2

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: yacito-${{ matrix.name }}-${{ inputs.tag || github.ref_name }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
          retention-days: 30

  draft-release:
    name: Draft GitHub release
    needs: build-release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts

      - name: Package release artifacts
        run: |
          set -euo pipefail
          mkdir -p release-assets
          found=0
          for artifact_dir in release-artifacts/*; do
            [ -d "$artifact_dir" ] || continue
            found=1
            artifact_name="$(basename "$artifact_dir")"
            (cd "$artifact_dir" && zip -r "../../release-assets/${artifact_name}.zip" .)
          done
          if [ "$found" -eq 0 ]; then
            echo "No release artifact directories found" >&2
            exit 1
          fi

      - name: Create or update draft release
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No packaged release artifacts found" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.id')"
            gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets" --paginate --jq '.[].id' | while read -r asset_id; do
              [ -n "$asset_id" ] || continue
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" >/dev/null
            done
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --draft \
              --title "Yacito $RELEASE_TAG" \
              --notes-file CHANGELOG.md
          fi
        env:
          GH_TOKEN: ${{ github.token }}
